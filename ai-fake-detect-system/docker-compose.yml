services:
  frontend:
    build:
      context: ./frontend
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-AI Fake Detect System}
      NEXT_PUBLIC_APP_DESCRIPTION: ${NEXT_PUBLIC_APP_DESCRIPTION:-AI Fake Detect System}
      NEXT_PUBLIC_DEFAULT_LOCALE: ${NEXT_PUBLIC_DEFAULT_LOCALE:-en}
      NEXT_PUBLIC_LOCALE_DETECT_ENABLED: ${NEXT_PUBLIC_LOCALE_DETECT_ENABLED:-false}
      NEXT_PUBLIC_API_BASE_URL: http://backend:5001
      AUTH_SECRET: ${AUTH_SECRET:-change-me}
      DATABASE_PROVIDER: ${DATABASE_PROVIDER:-sqlite}
      DATABASE_URL: ${DATABASE_URL:-file:data/local.db}
      DB_SCHEMA_FILE: ${DB_SCHEMA_FILE:-./src/config/db/schema.sqlite.ts}
      DB_MIGRATIONS_OUT: ${DB_MIGRATIONS_OUT:-./src/config/db/migrations_sqlite}
      DB_SINGLETON_ENABLED: ${DB_SINGLETON_ENABLED:-true}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-1}
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    expose:
      - "5001"
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
